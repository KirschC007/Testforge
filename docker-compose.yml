version: "3.9"

# TestForge Self-Hosted Stack (S4-4)
# Enterprise plan — runs entirely in your VPC
#
# Usage:
#   cp .env.example .env
#   # Fill in your API keys in .env
#   docker compose up -d
#
# Services:
#   app     — TestForge Node.js server (port 3000)
#   db      — MySQL 8 database
#   minio   — S3-compatible object storage
#   nginx   — Reverse proxy with TLS termination

services:
  app:
    image: testforge/app:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://testforge:${MYSQL_PASSWORD}@db:3306/testforge
      JWT_SECRET: ${JWT_SECRET}
      BUILT_IN_FORGE_API_KEY: ${LLM_API_KEY}
      BUILT_IN_FORGE_API_URL: ${LLM_API_URL:-https://api.openai.com/v1}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-testforge}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-testforge}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID}
      OWNER_NAME: ${OWNER_NAME}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - testforge

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: testforge
      MYSQL_USER: testforge
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "testforge", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - testforge

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-testforge}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"  # MinIO console (optional, disable in production)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - testforge

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - testforge

volumes:
  db_data:
  minio_data:

networks:
  testforge:
    driver: bridge
