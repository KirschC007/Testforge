version: "3.9"

# TestForge Hetzner Deployment
# Runs on port 3001 alongside other apps on the same server
#
# Usage:
#   cp .env.hetzner .env
#   docker compose -f docker-compose.hetzner.yml up -d --build
#
# Services:
#   app     — TestForge Node.js server (port 3001)
#   db      — MySQL 8 database (internal only)
#   minio   — S3-compatible object storage (internal only)

services:
  app:
    image: testforge/app:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://testforge:${MYSQL_PASSWORD}@db:3306/testforge
      JWT_SECRET: ${JWT_SECRET}
      BUILT_IN_FORGE_API_KEY: ${LLM_API_KEY}
      BUILT_IN_FORGE_API_URL: ${LLM_API_URL:-https://generativelanguage.googleapis.com/v1beta/openai}
      VITE_FRONTEND_FORGE_API_KEY: ${LLM_API_KEY}
      VITE_FRONTEND_FORGE_API_URL: ${LLM_API_URL:-https://generativelanguage.googleapis.com/v1beta/openai}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-testforge}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-testforge}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      # Disable Manus OAuth (not needed for self-hosted)
      VITE_APP_ID: ""
      OAUTH_SERVER_URL: ""
      VITE_OAUTH_PORTAL_URL: ""
      OWNER_OPEN_ID: ""
      OWNER_NAME: ""
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - testforge

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: testforge
      MYSQL_USER: testforge
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - testforge_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "testforge", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - testforge

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-testforge}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - testforge_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - testforge

volumes:
  testforge_db_data:
  testforge_minio_data:

networks:
  testforge:
    driver: bridge
