# GENERATED by TestForge v5.0
# Commit this file to .github/workflows/ to enable automatic proof verification
# Two Playwright projects: api-security (no browser) + browser-e2e (Chromium)

name: TestForge Proof Suite
on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main]

jobs:
  p0-security:
    name: "P0 — Security & Tenant Isolation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test tests/security/ --project=api-security
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
          E2E_TECHNICIAN_USER: ${{ secrets.E2E_TECHNICIAN_USER }}
          E2E_TECHNICIAN_PASS: ${{ secrets.E2E_TECHNICIAN_PASS }}
          E2E_NURSE_USER: ${{ secrets.E2E_NURSE_USER }}
          E2E_NURSE_PASS: ${{ secrets.E2E_NURSE_PASS }}
          E2E_BILLING_USER: ${{ secrets.E2E_BILLING_USER }}
          E2E_BILLING_PASS: ${{ secrets.E2E_BILLING_PASS }}
          E2E_ADMIN_USER: ${{ secrets.E2E_ADMIN_USER }}
          E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
          TEST_TENANT_ID: ${{ secrets.TEST_TENANT_ID }}
          TEST_TENANT_B_ID: ${{ secrets.TEST_TENANT_B_ID }}
          DEBUG_API_TOKEN: ${{ secrets.DEBUG_API_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: p0-playwright-report
          path: playwright-report/

  p1-integration:
    name: "P1 — Integration & Business Logic"
    runs-on: ubuntu-latest
    needs: p0-security
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test tests/integration/ tests/compliance/ tests/business/ --project=api-security
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
          E2E_TECHNICIAN_USER: ${{ secrets.E2E_TECHNICIAN_USER }}
          E2E_TECHNICIAN_PASS: ${{ secrets.E2E_TECHNICIAN_PASS }}
          E2E_NURSE_USER: ${{ secrets.E2E_NURSE_USER }}
          E2E_NURSE_PASS: ${{ secrets.E2E_NURSE_PASS }}
          E2E_BILLING_USER: ${{ secrets.E2E_BILLING_USER }}
          E2E_BILLING_PASS: ${{ secrets.E2E_BILLING_PASS }}
          E2E_ADMIN_USER: ${{ secrets.E2E_ADMIN_USER }}
          E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
          TEST_TENANT_ID: ${{ secrets.TEST_TENANT_ID }}
          DEBUG_API_TOKEN: ${{ secrets.DEBUG_API_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: p1-playwright-report
          path: playwright-report/

  p2-browser-e2e:
    name: "P2 — Browser E2E Tests"
    runs-on: ubuntu-latest
    needs: p1-integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test tests/e2e/ --project=browser-e2e
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
          E2E_TECHNICIAN_USER: ${{ secrets.E2E_TECHNICIAN_USER }}
          E2E_TECHNICIAN_PASS: ${{ secrets.E2E_TECHNICIAN_PASS }}
          E2E_NURSE_USER: ${{ secrets.E2E_NURSE_USER }}
          E2E_NURSE_PASS: ${{ secrets.E2E_NURSE_PASS }}
          E2E_BILLING_USER: ${{ secrets.E2E_BILLING_USER }}
          E2E_BILLING_PASS: ${{ secrets.E2E_BILLING_PASS }}
          E2E_ADMIN_USER: ${{ secrets.E2E_ADMIN_USER }}
          E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
          TEST_TENANT_ID: ${{ secrets.TEST_TENANT_ID }}
          DEBUG_API_TOKEN: ${{ secrets.DEBUG_API_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: p2-browser-e2e-report
          path: playwright-report/

  proof-gate:
    name: "✓ Alle Beweise bestanden"
    needs: [p0-security, p1-integration, p2-browser-e2e]
    runs-on: ubuntu-latest
    steps:
      - run: echo "System ist spec-konform. API + Browser E2E bestanden."
